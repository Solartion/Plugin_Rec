<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing Recorder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <!-- Main UI -->
        <div id="mainUI">
            <!-- Header -->
            <div class="header">
                <div class="title-row">
                    <svg class="logo" viewBox="0 0 24 24" width="20" height="20">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
                        <circle cx="12" cy="12" r="4" fill="currentColor" />
                    </svg>
                    <h1>Drawing Recorder</h1>
                </div>
                <div id="statusBadge" class="status-badge status-idle">
                    <span class="status-dot"></span>
                    <span id="statusText">Остановлено</span>
                </div>
            </div>

            <!-- Document Info -->
            <div id="docInfo" class="doc-info">
                <div class="doc-info-placeholder">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <path
                            d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"
                            fill="currentColor" opacity="0.3" />
                    </svg>
                    <span>Откройте документ для начала</span>
                </div>
                <div class="doc-info-content" style="display:none">
                    <span id="docName" class="doc-name"></span>
                    <span id="docSize" class="doc-size"></span>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="btnRecord" class="btn btn-record" title="Начать запись">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <circle cx="12" cy="12" r="8" fill="currentColor" />
                    </svg>
                    <span>Запись</span>
                </button>
                <button id="btnPause" class="btn btn-pause" disabled title="Пауза">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor" />
                        <rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor" />
                    </svg>
                    <span>Пауза</span>
                </button>
                <button id="btnStop" class="btn btn-stop" disabled title="Стоп">
                    <svg viewBox="0 0 24 24" width="18" height="18">
                        <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" />
                    </svg>
                    <span>Стоп</span>
                </button>
            </div>

            <!-- Stats -->
            <div id="stats" class="stats">
                <div class="stat-item">
                    <span class="stat-label">Кадров</span>
                    <span id="frameCount" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Время записи</span>
                    <span id="elapsedTime" class="stat-value">00:00</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Размер</span>
                    <span id="totalSize" class="stat-value">0 MB</span>
                </div>
            </div>

            <!-- Progress bar (recording indicator) -->
            <div id="progressBar" class="progress-bar" style="display:none">
                <div id="progressFill" class="progress-fill"></div>
            </div>

            <!-- Encoding progress (shown after stop) -->
            <div id="encodingSection" class="encoding-section" style="display:none">
                <div class="encoding-header">
                    <span class="encoding-spinner"></span>
                    <span id="encodingStatus">Кодирование видео...</span>
                </div>
                <div class="encoding-bar">
                    <div id="encodingFill" class="encoding-fill"></div>
                </div>
            </div>

            <!-- Settings -->
            <div class="settings">
                <h2>Настройки</h2>

                <div class="setting-row">
                    <label for="intervalSlider">Интервал: <strong id="intervalValue">3</strong> сек</label>
                    <input type="range" id="intervalSlider" min="1" max="30" value="3" step="1">
                </div>

                <div class="setting-row">
                    <label for="videoFormat">Формат видео:</label>
                    <select id="videoFormat" class="select-input">
                        <option value="mp4">MP4 (H.264)</option>
                        <option value="mkv">MKV (H.264)</option>
                        <option value="mov">MOV (H.264)</option>
                        <option value="avi">AVI (MJPEG)</option>
                        <option value="webm">WebM (VP9)</option>
                    </select>
                </div>

                <div class="setting-row">
                    <label for="frameHold">Длительность кадра:</label>
                    <select id="frameHold" class="select-input">
                        <option value="0.1">0.1 сек (очень быстро)</option>
                        <option value="0.25">0.25 сек (быстро)</option>
                        <option value="0.5" selected>0.5 сек (нормально)</option>
                        <option value="1">1 сек (медленно)</option>
                        <option value="1.5">1.5 сек</option>
                        <option value="2">2 сек (очень медленно)</option>
                        <option value="3">3 сек</option>
                    </select>
                </div>

                <div class="setting-row">
                    <label for="resScale">Размер кадра:</label>
                    <select id="resScale" class="select-input">
                        <option value="1">100% (Оригинал)</option>
                        <option value="2" selected>50% (1/2 размера)</option>
                        <option value="4">25% (1/4 размера)</option>
                    </select>
                </div>

                <div class="setting-row checkbox-row">
                    <label>
                        <input type="checkbox" id="chkSmoothTransitions" checked>
                        Плавный переход (Crossfade)
                    </label>
                </div>

                <div class="setting-row">
                    <label>Папка сохранения:</label>
                    <div class="folder-row">
                        <span id="folderPath" class="folder-path" title="">Не выбрана</span>
                        <button id="btnSelectFolder" class="btn btn-small">Выбрать</button>
                    </div>
                </div>

                <div class="setting-row">
                    <label>FFmpeg:</label>
                    <div class="folder-row">
                        <span id="ffmpegPath" class="folder-path" title="">Не найден</span>
                        <button id="btnSelectFFmpeg" class="btn btn-small">Указать</button>
                    </div>
                </div>

                <div class="setting-row checkbox-row">
                    <label>
                        <input type="checkbox" id="chkDeleteFrames" checked>
                        Удалить кадры после кодирования
                    </label>
                </div>


            </div>

            <!-- Log -->
            <div class="log-section">
                <h2>Журнал</h2>
                <div id="logContainer" class="log-container">
                    <div class="log-entry log-info">Плагин загружен. Укажите FFmpeg, папку и начните запись.</div>
                </div>
            </div>
        </div>

        <!-- Minimal UI -->
        <div id="minimalUI" class="hidden">
            <div class="min-status">
                <span class="min-dot" id="minDot"></span>
                <span id="minTime" class="min-time">00:00:00</span>
            </div>
            <div class="min-controls">
                <button id="btnMinPause" class="btn btn-small" title="Пауза">
                    <svg viewBox="0 0 24 24" width="14" height="14">
                        <rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor" />
                        <rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor" />
                    </svg>
                </button>
                <button id="btnMinStop" class="btn btn-small btn-stop-min" title="Стоп">
                    <svg viewBox="0 0 24 24" width="14" height="14">
                        <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="libs/CSInterface.js"></script>
    <script src="main.js"></script>
</body>

</html>
